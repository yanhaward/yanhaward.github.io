<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - ArenaEval</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    {% include topbar.html %}

    <main>
      <section class="panel">
        <h2>用户登录入口</h2>
        <p class="section-copy">支持用户名 + 密码登录入口，你也可以扩展到 OAuth 或企业 SSO。</p>
        <form class="card form-card" id="loginForm">
          <label>
            用户名
            <input type="text" name="username" placeholder="请输入用户名" required />
          </label>
          <label>
            密码
            <input type="password" name="password" placeholder="请输入密码" required />
          </label>
          <button type="submit" class="primary-btn full">登录</button>
        </form>
        <p id="loginStatus" class="status">未登录</p>
      </section>
    </main>

    {% include footer.html %}
    <script src="/assets/js/app.js"></script>
  </body>
</html>
