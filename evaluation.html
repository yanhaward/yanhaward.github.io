<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>评测入口 - ArenaEval</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    {% include topbar.html %}

    <main>
      <section class="panel">
        <h2>评测入口</h2>
        <p class="section-copy">提交模型、选择测试集并触发评测。</p>
        <form class="card form-card" id="evalForm">
          <label>
            模型名称
            <input type="text" name="modelName" placeholder="例如：DexPilot-v2" required />
          </label>
          <label>
            测试项目
            <select name="testName" required>
              <option value="Pick & Place">Pick & Place</option>
              <option value="Long Horizon">Long Horizon</option>
              <option value="Tool Use">Tool Use</option>
              <option value="Navigation">Navigation</option>
            </select>
          </label>
          <label>
            提交版本
            <input type="text" name="version" placeholder="例如：v1.3.5" required />
          </label>
          <button type="submit" class="primary-btn full">提交评测</button>
        </form>
        <p id="evalStatus" class="status">暂无新提交</p>
      </section>
    </main>

    {% include footer.html %}
    <script src="/assets/js/app.js"></script>
  </body>
</html>
