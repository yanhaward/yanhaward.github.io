{% assign profile = site.data.profile %}

<header class="topbar">
  <div class="brand">
    <a href="/index.html" data-i18n-aria-label="topbar.homeAria" aria-label="Go to home">
      <img class="brand-logo" src="/assets/images/logo.png" data-i18n-alt="topbar.logoAlt" alt="ArenaEval 机器人竞赛 Logo" />
    </a>
    <span class="brand-text">{{profile.name}}</span>
  </div>
  <nav class="topnav">
    <a href="/index.html" data-i18n="topbar.home" {% if page.url contains '/index' or page.url == '/' %}class="active"{% endif %}>Home</a>
    <a href="/leaderboard" data-i18n="topbar.leaderboard" {% if page.url contains '/leaderboard' %}class="active"{% endif %}>Leaderboard</a>
    <a href="/tasks" data-i18n="topbar.tasks" {% if page.url contains '/tasks' %}class="active"{% endif %}>Tasks</a>
    <a href="/history" data-i18n="topbar.history" {% if page.url contains '/history' %}class="active"{% endif %}>History</a>
  </nav>
  <div class="topbar-actions">
    <a class="ghost-btn" data-i18n="topbar.join" href="/evaluation">Join Challenge</a>
    <a class="ghost-btn" data-i18n="topbar.login" href="/login">Log in</a>
    <button class="lang-toggle" id="langToggleBtn" type="button" aria-label="Switch language">EN</button>
  </div>
</header>
