---
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="title.history">历史评测结果 - ArenaEval</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    {% include topbar.html %}

    <main>
      <section class="panel">
        <div class="history-head">
          <div>
            <h2 data-i18n="history.heading">单项测试历史评测结果</h2>
            <p class="section-copy" data-i18n="history.desc">按测试项目查看历次评测记录和分数波动。</p>
          </div>
          <label class="history-filter">
            <span data-i18n="history.filterLabel">选择测试项目</span>
            <select id="testFilter"></select>
          </label>
        </div>

        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    {% include footer.html %}
    <script src="/assets/js/app.js"></script>
  </body>
</html>
