<!doctype html>
<html lang="zh-CN">
<head>
  <title data-i18n="title.replayViewer">Replay Viewer - ArenaEval</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <!-- <style>  </style> -->
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  {% include topbar.html %}

  <div class="replayviewer-page">

    <!-- ── LEFT: connection + eval + charts ── -->
    <aside class="replayviewer-left">

      <!-- server connection -->
      <div class="replayviewer-conn-row">
        <input type="text" id="replayviewerServerUrl" value="ws://localhost:9000" />
        <button type="button" class="secondary-btn" id="replayviewerConnectBtn" onclick="toggleReplayViewerConnection()">连接</button>
      </div>
      <div class="replayviewer-ws-badge disconnected" id="replayviewerWsStatus">
        <span class="replayviewer-ws-badge-dot"></span>
        <span id="replayviewerWsStatusText">未连接</span>
      </div>
      <div class="replayviewer-stats">
        <span>帧率:&nbsp;<strong id="replayviewerFps">0</strong> FPS</span>
        <span>接收帧数:&nbsp;<strong id="replayviewerFrameCount">0</strong></span>
        <span>延迟:&nbsp;<strong id="replayviewerLatency">-</strong> ms</span>
      </div>

      <hr class="replayviewer-divider" />

      <!-- eval control -->
      <div class="replayviewer-eval-ctrl">
        <p id="replayviewerPendingInfo" class="section-copy" data-i18n="replayViewer.idleNoTask">当前没有待评测任务。</p>
        <button id="replayviewerStartBtn" type="button" class="primary-btn full" data-i18n="replayViewer.start">开始</button>
        <p id="replayviewerStatus" class="status" data-i18n="replayViewer.statusIdle">等待开始评测</p>
        <a id="replayviewerHistoryLink" href="/history" class="secondary-btn" hidden data-i18n="replayViewer.gotoHistory">查看历史结果</a>
      </div>

      <hr class="replayviewer-divider" />

      <!-- joint charts -->
      <div class="replayviewer-chart-section">
        <div class="replayviewer-chart-label">Joint 1 ~ 6</div>
        <div class="replayviewer-chart-wrap">
          <canvas id="replayviewerJointsCanvas" class="replayviewer-chart-canvas" height="130"></canvas>
          <div id="replayviewerChartTooltip" class="replayviewer-chart-tooltip"></div>
        </div>
        <div class="replayviewer-chart-label">Gripper</div>
        <canvas id="replayviewerGripperCanvas" class="replayviewer-chart-canvas" height="52"></canvas>
      </div>

    </aside>

    <div
      class="replayviewer-resizer replayviewer-resizer-left"
      id="replayviewerLeftResizer"
      role="separator"
      aria-orientation="vertical"
      aria-label="Resize left panel"
      tabindex="0"
    ></div>

    <!-- ── CENTER: URDF viewer ── -->
    <div class="replayviewer-center">
      <div class="replayviewer-center-header">URDF &#23454;&#26102;&#26174;&#31034;</div>
      <div id="replayviewerUrdfContainer">
        <div class="replayviewer-urdf-ph" id="replayviewerUrdfPh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
            <circle cx="12" cy="4" r="1.8"/>
            <line x1="12" y1="5.8" x2="12" y2="10"/>
            <circle cx="12" cy="11.8" r="1.8"/>
            <line x1="12" y1="13.6" x2="7.5" y2="18.5"/>
            <line x1="12" y1="13.6" x2="16.5" y2="18.5"/>
            <circle cx="7.5" cy="20" r="1.5"/>
            <circle cx="16.5" cy="20" r="1.5"/>
          </svg>
          <span>&#31561;&#24453;&#26426;&#22120;&#20154;&#25968;&#25454;...</span>
        </div>
      </div>
    </div>

    <div
      class="replayviewer-resizer replayviewer-resizer-right"
      id="replayviewerRightResizer"
      role="separator"
      aria-orientation="vertical"
      aria-label="Resize right panel"
      tabindex="0"
    ></div>

    <!-- ── RIGHT: cameras ── -->
    <!-- TODO：换成3个视频 -->
    <div class="replayviewer-right">
      <div class="replayviewer-cam-item" onclick="expandReplayViewerCamera('left')">
        <div class="replayviewer-cam-label">left camera</div>
        <div class="replayviewer-cam-wrap">
          <img id="replayviewerLeftCamera" alt="left camera" />
          <div class="replayviewer-cam-ns" id="replayviewerLeftNoSignal">&#31561;&#24453;&#22270;&#20687;...</div>
        </div>
      </div>
      <div class="replayviewer-cam-item" onclick="expandReplayViewerCamera('head')">
        <div class="replayviewer-cam-label">head camera</div>
        <div class="replayviewer-cam-wrap">
          <img id="replayviewerHeadCamera" alt="head camera" />
          <div class="replayviewer-cam-ns" id="replayviewerHeadNoSignal">&#31561;&#24453;&#22270;&#20687;...</div>
        </div>
      </div>
      <div class="replayviewer-cam-item" onclick="expandReplayViewerCamera('right')">
        <div class="replayviewer-cam-label">right camera</div>
        <div class="replayviewer-cam-wrap">
          <img id="replayviewerRightCamera" alt="right camera" />
          <div class="replayviewer-cam-ns" id="replayviewerRightNoSignal">&#31561;&#24453;&#22270;&#20687;...</div>
        </div>
      </div>
    </div>

  </div><!-- /.replayviewer-page -->

  <!-- camera expand modal -->
  <div id="replayviewerCamModal" class="replayviewer-modal" onclick="onReplayViewerModalBgClick(event)">
    <img id="replayviewerModalImg" alt="camera fullscreen" />
    <button class="replayviewer-modal-close" onclick="closeReplayViewerCamera()" title="&#20851;&#38381;">&#10005;</button>
  </div>

  {% include footer.html %}
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/urdf_viewer.js"></script>
  <script src="/assets/js/replay_viewer.js"></script>
</body>
</html>
