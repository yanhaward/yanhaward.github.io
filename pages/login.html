---
permalink: /login/
---
<!doctype html>
<html lang="zh-CN">
  <head>
    <title data-i18n="title.login">登录 - ArenaEval</title>
    <meta name="description" content="Log in to the RoboDojo robot policy evaluation platform." />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    {% include topbar.html %}

    <main>
      <section class="panel">
        <h2 data-i18n="login.heading">用户登录入口</h2>
        <p class="section-copy" data-i18n="login.desc">支持用户名 + 密码登录入口，你也可以扩展到 OAuth 或企业 SSO。</p>
        <form class="card form-card" id="loginForm">
          <label>
            <span data-i18n="login.usernameLabel">用户名</span>
            <input type="text" name="username" data-i18n-placeholder="login.usernamePlaceholder" placeholder="请输入用户名" required />
          </label>
          <label>
            <span data-i18n="login.passwordLabel">密码</span>
            <input type="password" name="password" data-i18n-placeholder="login.passwordPlaceholder" placeholder="请输入密码" required />
          </label>
          <button type="submit" class="primary-btn full" data-i18n="login.submit">登录</button>
        </form>
        <p id="loginStatus" class="status" data-i18n="login.statusIdle">未登录</p>
      </section>
    </main>

    {% include footer.html %}
    <script src="/assets/js/app.js"></script>
  </body>
</html>
