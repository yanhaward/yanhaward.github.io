premalink: /viewer/
---

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器人观测图像查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        label {
            color: #555;
            font-weight: 600;
        }
        
        input[type="text"] {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .status.disconnected {
            background: #fee;
            color: #c33;
        }
        
        .status.connected {
            background: #efe;
            color: #3c3;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status.disconnected .status-dot {
            background: #c33;
        }
        
        .status.connected .status-dot {
            background: #3c3;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats {
            margin-top: 15px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            color: #666;
            font-size: 14px;
        }
        
        .stat-value {
            font-weight: 700;
            color: #333;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .video-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .video-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            min-height: 240px;
        }
        
        .video-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .no-signal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 16px;
            text-align: center;
        }
        
        .footer {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 15px 30px;
            text-align: center;
            color: #666;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 机器人观测图像实时查看器</h1>
            
            <div class="controls">
                <div class="control-group">
                    <label for="serverUrl">服务器地址:</label>
                    <input type="text" id="serverUrl" value="ws://localhost:9000" placeholder="ws://localhost:9000">
                </div>
                
                <button id="connectBtn" onclick="toggleConnection()">连接</button>
                
                <div class="status disconnected" id="status">
                    <span class="status-dot"></span>
                    <span id="statusText">未连接</span>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    帧率: <span class="stat-value" id="fps">0</span> FPS
                </div>
                <div class="stat-item">
                    接收帧数: <span class="stat-value" id="frameCount">0</span>
                </div>
                <div class="stat-item">
                    延迟: <span class="stat-value" id="latency">-</span> ms
                </div>
            </div>
        </div>
        
        <div class="video-grid">
            <div class="video-card">
                <h3>📷 头部摄像头</h3>
                <div class="video-wrapper">
                    <img id="headCamera" alt="头部摄像头">
                    <div class="no-signal" id="headNoSignal">等待图像...</div>
                </div>
            </div>
            
            <div class="video-card">
                <h3>📷 左侧摄像头</h3>
                <div class="video-wrapper">
                    <img id="leftCamera" alt="左侧摄像头">
                    <div class="no-signal" id="leftNoSignal">等待图像...</div>
                </div>
            </div>
            
            <div class="video-card">
                <h3>📷 右侧摄像头</h3>
                <div class="video-wrapper">
                    <img id="rightCamera" alt="右侧摄像头">
                    <div class="no-signal" id="rightNoSignal">等待图像...</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Policy Server Client - Real-time Observation Viewer</p>
        </div>
    </div>

    <script>
        let ws = null;
        let connected = false;
        let frameCount = 0;
        let lastFrameTime = Date.now();
        let fpsCounter = 0;
        let lastFpsUpdate = Date.now();
        
        const headImg = document.getElementById('headCamera');
        const leftImg = document.getElementById('leftCamera');
        const rightImg = document.getElementById('rightCamera');
        
        const headNoSignal = document.getElementById('headNoSignal');
        const leftNoSignal = document.getElementById('leftNoSignal');
        const rightNoSignal = document.getElementById('rightNoSignal');
        
        function updateStatus(isConnected, text) {
            const statusDiv = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            const connectBtn = document.getElementById('connectBtn');
            
            connected = isConnected;
            statusText.textContent = text;
            
            if (isConnected) {
                statusDiv.className = 'status connected';
                connectBtn.textContent = '断开';
                connectBtn.disabled = false;
            } else {
                statusDiv.className = 'status disconnected';
                connectBtn.textContent = '连接';
                connectBtn.disabled = false;
            }
        }
        
        function toggleConnection() {
            if (connected) {
                disconnect();
            } else {
                connect();
            }
        }
        
        function connect() {
            const serverUrlInput = document.getElementById('serverUrl').value;
            const serverUrl = serverUrlInput.includes('role=viewer')
                ? serverUrlInput
                : (serverUrlInput.includes('?')
                    ? serverUrlInput + '&role=viewer'
                    : serverUrlInput + '?role=viewer');
            updateStatus(false, '连接中...');
            document.getElementById('connectBtn').disabled = true;
            
            try {
                ws = new WebSocket(serverUrl);
                
                ws.onopen = function() {
                    console.log('WebSocket连接已建立');
                    updateStatus(true, '已连接');
                    frameCount = 0;
                    lastFpsUpdate = Date.now();
                    fpsCounter = 0;
                };
                
                ws.onmessage = function(event) {
                    handleMessage(event.data);
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket错误:', error);
                    updateStatus(false, '连接错误');
                };
                
                ws.onclose = function() {
                    console.log('WebSocket连接已关闭');
                    updateStatus(false, '未连接');
                };
                
            } catch (error) {
                console.error('连接失败:', error);
                updateStatus(false, '连接失败');
            }
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            updateStatus(false, '未连接');
        }
        
        async function handleMessage(data) {
            try {
                const now = Date.now();
                
                // 尝试解析JSON数据
                let message;
                if (typeof data === 'string') {
                    message = JSON.parse(data);
                } else {
                    // 如果是Blob，读取为文本
                    const text = await data.text();
                    message = JSON.parse(text);
                }
                
                if (message.type === 'obs' && message.obs) {
                    const obs = typeof message.obs === 'string'
                        ? JSON.parse(message.obs)
                        : message.obs;
                    
                    // 更新图像
                    if (obs.observation) {
                        if (obs.observation.head_camera) {
                            updateImage(headImg, headNoSignal, obs.observation.head_camera);
                        }
                        if (obs.observation.left_camera) {
                            updateImage(leftImg, leftNoSignal, obs.observation.left_camera);
                        }
                        if (obs.observation.right_camera) {
                            updateImage(rightImg, rightNoSignal, obs.observation.right_camera);
                        }
                    }
                    
                    // 更新统计信息
                    frameCount++;
                    fpsCounter++;
                    document.getElementById('frameCount').textContent = frameCount;
                    
                    const latency = now - lastFrameTime;
                    document.getElementById('latency').textContent = latency;
                    lastFrameTime = now;
                    
                    // 更新FPS（每秒更新一次）
                    if (now - lastFpsUpdate >= 1000) {
                        const fps = (fpsCounter / ((now - lastFpsUpdate) / 1000)).toFixed(1);
                        document.getElementById('fps').textContent = fps;
                        fpsCounter = 0;
                        lastFpsUpdate = now;
                    }
                    
                }
                
            } catch (error) {
                console.error('处理消息失败:', error);
            }
        }
        
        function updateImage(imgElement, noSignalElement, imageData) {
            try {
                let base64Data;
                if (imageData && imageData.__bytes__ === true && typeof imageData.data === 'string') {
                    // 对齐后端 json_serializer: {"__bytes__": true, "data": "base64..."}
                    base64Data = imageData.data;
                } else if (typeof imageData === 'string') {
                    // 兼容直接传 base64 字符串
                    base64Data = imageData;
                } else {
                    console.error('未知的图像数据格式');
                    return;
                }
                
                // 设置图像src（假设是JPEG格式）
                imgElement.src = 'data:image/jpeg;base64,' + base64Data;
                imgElement.style.display = 'block';
                noSignalElement.style.display = 'none';
                
            } catch (error) {
                console.error('更新图像失败:', error);
            }
        }
        
        // 页面加载时隐藏图像
        window.addEventListener('load', function() {
            headImg.style.display = 'none';
            leftImg.style.display = 'none';
            rightImg.style.display = 'none';
        });
    </script>
</body>
</html>
